# Production stack for VPS deployment
# Usage:
#   cp deploy/.env.example .env   (edit with your domain)
#   make deploy-build
#   make deploy-up
#
# Models are pulled automatically on first start.
# To run Ollama on a dedicated GPU server in the future, extract the
# ollama service into its own compose file and point OLLAMA_HOST at
# the remote address (e.g. http://gpu-server:11434).

services:
  ollama:
    image: ollama/ollama:latest
    container_name: second-brain-ollama
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2}
    volumes:
      - ollama-data:/root/.ollama
      - ./deploy/ollama/entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  gbrain:
    build:
      context: ./deploy/gbrain
    container_name: second-brain-gbrain
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_BASE_URL: http://ollama:11434/v1
      EMBEDDING_MODEL: "ollama:nomic-embed-text"
    volumes:
      - gbrain-data:/root/.gbrain
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./app/api
    container_name: second-brain-api
    environment:
      GBRAIN_URL: http://gbrain:3003
      OLLAMA_BASE_URL: http://ollama:11434/v1
      CORS_ORIGIN: ${CORS_ORIGIN}
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2}
      PORT: "3001"
    depends_on:
      gbrain:
        condition: service_started
      ollama:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: second-brain-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    restart: unless-stopped

  # Cloudflare Named Tunnel — stable HTTPS URL for the API.
  # Requires credentials file at deploy/cloudflared/credentials.json
  # URL: https://<tunnel-id>.cfargotunnel.com
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: second-brain-tunnel
    command: tunnel --no-autoupdate --config /home/nonroot/.cloudflared/config.yml run
    volumes:
      - ./deploy/cloudflared:/home/nonroot/.cloudflared:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama-data:
  gbrain-data:
  caddy-data:
  caddy-config:
