name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "app/api/**"
      - "deploy/**"
      - "docker-compose.prod.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/second-brain
            git pull origin main
            if [ ! -f deploy/cloudflared/credentials.json ]; then
              echo "ERROR: Tunnel not configured. Run 'bash deploy/setup-tunnel.sh' on this VPS first."
              exit 1
            fi
            make deploy-build
            make deploy-up
